repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: biome-staged
        name: biome (staged)
        entry: pnpm exec biome check --write --no-errors-on-unmatched
        language: system
        pass_filenames: true
        files: \.(cjs|css|cts|js|json|jsx|mjs|mts|ts|tsx)$
        stages: [pre-commit]

      - id: prettier-staged
        name: prettier (staged)
        entry: pnpm exec prettier --write --ignore-unknown
        language: system
        pass_filenames: true
        files: \.(astro|html|md|mdx|scss|svg|toml|yaml|yml)$
        stages: [pre-commit]

      - id: astro-check
        name: astro check
        entry: pnpm astro check
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: astro-build
        name: astro build
        entry: pnpm build
        language: system
        pass_filenames: false
        stages: [pre-push]
